<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firediting | Nikhil</title>

<style>

body{
margin:0;
font-family:Arial;
background:#071021;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:55px;
color:#2ea6ff;
}

.hero p{
opacity:0.8;
}

.btn{
padding:12px 25px;
background:#2ea6ff;
border-radius:25px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

.section{
margin-top:80px;
}

.skills{
max-width:500px;
margin:auto;
}

.skill{
margin:20px 0;
}

.bar{
background:#0f1c34;
height:10px;
border-radius:10px;
}

.progress{
height:10px;
background:#2ea6ff;
border-radius:10px;
}

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#0f1c34;
padding:20px;
border-radius:10px;
}

footer{
text-align:center;
margin-top:80px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<section class="hero">

<h1>Hi, I'm Nikhil</h1>
<p>Professional Video Editor</p>

<p>I create cinematic edits, Instagram reels and gaming montages.</p>

<a class="btn">View My Work</a>

</section>

<section class="section">

<h2>My Skills</h2>

<div class="skills">

<div class="skill">
<p>Premiere Pro</p>
<div class="bar">
<div class="progress" style="width:90%"></div>
</div>
</div>

<div class="skill">
<p>After Effects</p>
<div class="bar">
<div class="progress" style="width:80%"></div>
</div>
</div>

<div class="skill">
<p>CapCut</p>
<div class="bar">
<div class="progress" style="width:95%"></div>
</div>
</div>

</div>

</section>

<section class="section">

<h2>My Portfolio</h2>

<div class="portfolio">

<div class="card">Instagram Reel Edit</div>

<div class="card">Gaming Montage</div>

<div class="card">Cinematic Video</div>

<div class="card">YouTube Video Editing</div>

</div>

</section>

<footer>

<p>© 2026 Firediting | Nikhil</p>

</footer>

</div>

</body>
</html>
